
services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: social-support-api
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - MONGODB_HOST=mongodb
      - QDRANT_HOST=qdrant
      - NEO4J_HOST=neo4j
      - REDIS_HOST=redis
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_started
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: social-support-ui
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - API_BASE_URL=http://app:8000
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      - app
    command: ["streamlit", "run", "frontend/streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0"]

  postgres:
    image: postgres:16-alpine
    container_name: social-support-postgres
    environment:
      POSTGRES_DB: social_support
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d social_support"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: social-support-mongo
    environment:
      MONGO_INITDB_DATABASE: social_support
      MONGO_INITDB_ROOT_USERNAME: app_user
      MONGO_INITDB_ROOT_PASSWORD: app_password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: social-support-qdrant
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5-community
    container_name: social-support-neo4j
    environment:
      NEO4J_AUTH: neo4j/app_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "app_password", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: social-support-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 120s
    entrypoint: >
      sh -c "ollama serve &
      sleep 10 &&
      (ollama pull mistral:7b || true) &&
      (ollama pull nomic-embed-text || true) &&
      wait"

  redis:
    image: redis:7-alpine
    container_name: social-support-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongo_data:
  qdrant_data:
  neo4j_data:
  ollama_data:
